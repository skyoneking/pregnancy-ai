schema: spec-driven

context: |
  ## Project Overview
  全流程孕期AI助手应用，为备孕期、孕期和产后期的用户提供智能化咨询服务。
  基于 Next.js App Router、LangChain Agent 和 Supabase 构建。

  ## Tech Stack
  - Framework: Next.js 16 (App Router), React 19, TypeScript 5
  - AI/LLM: LangChain 1.x, LangGraph, Vercel AI SDK (@ai-sdk/react, @ai-sdk/langchain, @ai-sdk/alibaba)
  - Model: 通过 OpenAI 兼容 API 接入（环境变量：API_KEY, BASE_URL, MODEL）
  - Backend: Supabase（认证、PostgreSQL、实时数据库）
  - Styling: Tailwind CSS 4
  - Validation: Zod 4
  - HTTP Client: Axios
  - Package Manager: pnpm

  ## Architecture
  ### 页面
  - app/page.tsx              — 主聊天 UI（Client Component）
  - app/onboarding/page.tsx   — 引导页（认证→阶段选择→档案填写）
  - app/profile/page.tsx      — 个人中心（档案管理、推送设置）

  ### Hooks
  - app/hooks/useAgentChat.ts — 聊天状态与流式响应管理 hook
  - app/hooks/useAuth.ts      — 认证状态管理 hook

  ### API 路由
  - app/api/chat/route.ts     — 聊天 API，调用 LangChain agent
  - app/api/auth/login/route.ts     — 用户登录
  - app/api/auth/register/route.ts  — 用户注册
  - app/api/auth/reset-password/route.ts — 重置密码
  - app/api/auth/user/route.ts      — 获取用户信息
  - app/api/user/profile/route.ts   — 用户档案 CRUD

  ### Agent & 工具
  - app/_langchain/agent.ts   — LangChain agent：6个孕期工具、中间件、MemorySaver
  - app/_RAG/agent.ts         — RAG agent（待实现）
  - app/lib/knowledge.ts      — 知识库系统（备孕/孕期/产后知识）

  ### Supabase
  - app/_supabase/client.ts   — 浏览器端 Supabase 客户端
  - app/_supabase/server.ts   — 服务端 Supabase 客户端
  - app/_supabase/types.ts    — 数据库类型定义

  ## Domain & Features

  ### 核心工具（LangChain Agent）
  1. **calculate_pregnancy_info** — 根据预产期计算当前孕周、孕期阶段（孕早期/中期/晚期）和距预产期剩余天数
  2. **get_weekly_development** — 获取指定孕周的胎儿发育信息，支持准妈妈/准爸爸不同视角
  3. **check_food_safety** — 查询食物在孕期的安全等级（安全/适量/避免/禁止），含20+种常见食物
  4. **get_prenatal_schedule** — 获取产检时间表，根据当前孕周显示已完成、待完成和即将进行的产检项目
  5. **assess_symptom** — 评估孕期症状紧急程度（🟢正常/🟡观察/🟠就医/🔴急诊），采用"宁严勿松"原则
  6. **get_contextual_knowledge** — 获取当前阶段相关的专业知识，支持智能推送

  ### 用户系统
  - Supabase 手机号+密码认证
  - 三阶段用户档案：备孕期（preconception）/孕期（pregnancy）/产后期（postpartum）
  - 角色选择：准妈妈（mom）/准爸爸（dad）
  - 推送频率设置：每日/每周/手动

  ### 知识库
  - **备孕期**：6个核心知识点（叶酸补充、孕前检查、排卵计算、生活方式、营养准备、情绪管理）
  - **孕期**：42周发育指南（每周胎儿发育信息、注意事项）
  - **产后期**：10个恢复知识点（42天恢复、母乳喂养、新生儿护理、发育里程碑等）

  ### Agent Context Schema
  ```typescript
  {
    role: "mom" | "dad"                // 用户角色
    stage: "preconception" | "pregnancy" | "postpartum"  // 当前阶段
    due_date: string                   // 预产期 YYYY-MM-DD（孕期）
    postpartum_date: string            // 生产日期 YYYY-MM-DD（产后期）
    current_week: number               // 当前孕周（孕期）
    postpartum_days: number            // 产后天数（产后期）
  }
  ```

  ### AI 特性
  - 基于 LangGraph MemorySaver 的多轮对话记忆（thread_id 隔离）
  - 流式响应：Vercel AI SDK 实现实时状态更新
  - 系统提示：中文，专业温暖的孕期助产士人设
  - 智能推送：根据阶段和孕周主动推送相关知识
  - 医学免责声明：所有健康建议自动添加免责声明

  ## Conventions
  - TypeScript strict mode
  - 客户端组件使用 "use client" 指令
  - 模块化分层：agent 逻辑 / API 路由 / hooks / UI 组件 / Supabase 客户端
  - Conventional Commits 提交规范

  ## Testing
  - 测试框架：Vitest（单元/集成/组件）+ Playwright（E2E，Chrome only）
  - 目录结构：
    - `__tests__/unit/`：工具函数、中间件、Zod schema 单元测试
    - `__tests__/unit/api/`：Next.js API 路由集成测试
    - `__tests__/ui/`：React 组件渲染与交互测试（React Testing Library）
    - `e2e/`：Playwright 端到端测试（浏览器级别）
  - 命名规范：`*.test.ts` / `*.test.tsx`（Vitest）、`*.spec.ts`（Playwright）
  - Mock 策略：外部依赖通过 `vi.mock()` 隔离；E2E 测试使用 `page.route()` 拦截 `/api/chat`，返回 Vercel AI SDK SSE 格式 mock 响应，禁止真实 LLM API 调用
  - 覆盖率目标：核心业务代码（`app/**`）行覆盖率 ≥ 80%（`pnpm test:coverage`）
  - Playwright MCP 验证工作流：E2E 测试编写完成后，必须通过 Playwright MCP 工具（browser_navigate、browser_snapshot、browser_click 等）直接验证功能，截图确认每个关键步骤

rules:
  testing:
    - 测试文件放置在 `__tests__/`（Vitest）或 `e2e/`（Playwright）目录
    - 命名规范：`*.test.ts` / `*.test.tsx`（单元/组件）、`*.spec.ts`（E2E）
    - 每个测试文件必须包含 happy path 和边界用例
    - 外部依赖（LLM API、Next.js 框架、Supabase）通过 `vi.mock()` 隔离
  coverage:
    - agent 工具函数：覆盖所有条件分支（stage 判断、role 差异、异常路径）
    - API 路由：验证请求体解析、参数传递、Supabase 调用、stream 调用参数
    - UI 组件：覆盖所有渲染分支（user/assistant 角色、三种工具状态、data-status 条件渲染、表单交互）
    - 整体目标：`app/**` 行覆盖率 ≥ 80%
  layers:
    - unit/agent/：工具函数逻辑（6个孕期工具）、中间件（handleToolErrors）、Zod schema
    - unit/api/：Next.js 路由函数，mock 所有外部依赖（Supabase、LLM）
    - ui/：React Client Component，mock useChat hook、useAuth hook
    - e2e/（Playwright）：完整用户交互流程（引导→认证→档案→聊天），使用 page.route() 拦截后端，Chrome only
  e2e-validation:
    - E2E 测试代码完成后，必须通过 Playwright MCP 工具直接验证功能，不能仅依赖 `pnpm test:e2e` 命令行
    - 验证步骤：browser_navigate 导航页面 → browser_snapshot 检查元素存在 → browser_click 触发交互 → browser_take_screenshot 截图确认视觉结果
    - 每个关键 UI 状态（输入框、User消息、AI消息、引导步骤、表单）均需截图验证
